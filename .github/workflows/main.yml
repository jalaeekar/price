name: Sentinel Ultimate V4 Auto-Brain

on:
  schedule:
    # اجرای خودکار دقیقاً هر 2 ساعت یک‌بار (ساعات زوج)
    - cron: '0 */2 * * *' 
  workflow_dispatch: 
    # این خط یک دکمه در گیت‌هاب اضافه می‌کند تا هر زمان خواستید دستی اجرایش کنید

jobs:
  run-sentinel-brain:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Advanced Trading Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy yfinance requests scikit-learn scipy nltk xgboost

    - name: Execute Sentinel-AI Logic
      # اجرای فایل پایتون شما
      run: python sentinel_brain.py

    - name: Commit and Push Config for MetaTrader
      # ذخیره فایل JSON تولید شده و پوش کردن آن روی سرور تا متاتریدر بتواند آن را بخواند
      run: |
        git config --global user.name "Sentinel-Bot"
        git config --global user.email "bot@sentinel.ai"
        git add sentinel_config.json
        # اگر تغییری ایجاد شده بود کامیت کن، در غیر این صورت عبور کن
        git diff-index --quiet HEAD || git commit -m "🤖 Auto-Update: Sentinel V4 Strategy [Skip CI]"
        git push
