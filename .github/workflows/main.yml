name: Sentinel Ultimate V4 Auto-Brain

on:
  schedule:
    - cron: '0 */2 * * *' 
  workflow_dispatch: 

jobs:
  run-sentinel-brain:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Advanced Trading Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy yfinance requests scikit-learn scipy nltk xgboost transformers torch huggingface_hub

    - name: Execute Sentinel-AI Logic
      # ⚡️ در اینجا توکن از Secrets گیت‌هاب خوانده و به محیط پایتون تزریق می‌شود
      run: python sentinel_brain.py
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}

    - name: Commit and Push Config for MetaTrader
      run: |
        git config --global user.name "Sentinel-Bot"
        git config --global user.email "bot@sentinel.ai"
        git add sentinel_config.json
        git diff-index --quiet HEAD || git commit -m "🤖 Auto-Update: Sentinel V15 Signal Data [Skip CI]"
        git push
